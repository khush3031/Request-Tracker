name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 — Run on every push and every PR targeting main
  # ────────────────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (CJS + ESM)
        run: npm run build

      - name: Test
        run: npm test

  # ────────────────────────────────────────────────────────────────
  # Job 2 — Publish to npm (only when CI passes on a direct push to main)
  # PRs never trigger this job.
  # ────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: ci                               # must pass Build & Test first
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write                       # needed to push git tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Compare local package.json version against what is already on npm.
      # This means you control publishing purely by bumping the version —
      # no publish happens if the version is unchanged.
      - name: Check if version changed
        id: version_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view request-tracker-pro version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL"
          echo "published=$PUBLISHED"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "version=$LOCAL" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version bump detected — skipping publish."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.changed == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push git tag
        if: steps.version_check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version_check.outputs.version }}"
          git push origin "v${{ steps.version_check.outputs.version }}"
